name: Build RS binaries

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-workflow]

concurrency:
    group: ${{ github.repository }}-${{ github.workflow }}
    cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  compile-regstation:
    name: Compile regstation
    runs-on: ubuntu-latest
    outputs:
      regstationversion: ${{ steps.compile_regstation_step.outputs.regstationversion }}
      dorelease: ${{ steps.compile_regstation_step.outputs.dorelease }}
    strategy:
      matrix:
        #cpu: [jz4770]
        #cpu: [arm1176jzf_s, cortex_a7, cortex_a9, cortex_a15_a7, cortex_a17, cortex_a35, cortex_a53, cortex_a55, cortex_a72, cortex_a72_a53, cortex_a73_a53, cortex_a75_a55, cortex_a76, cortex_a76_a55, riscv, saphira, x86_64, x86_64_v3]
        cpu: [cortex_a76_a55]
        include:
          - target: sm8250
            cpu: cortex_a76_a55
          # arch: aarch64-glibc
      fail-fast: false

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Clone repository
        id: clone_step
        uses: actions/checkout@v6.0.2
        with:
          repository: REG-Linux/REG-WIP
          token: ${{ secrets.REG_TOKEN }}
          submodules: true

      - name: Compile regstation
        id: compile_regstation_step
        env:
          GH_TOKEN: ${{ secrets.REG_TOKEN }}
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"
          git config --local user.password ${{ github.token }}
          regstationversion="$(sed -n 's/^REGSTATION_VERSION[[:space:]]*=[[:space:]]*\([0-9a-fA-F]\{7\}\).*/\1/p' package/frontend/regstation/regstation.mk)"
          echo "regstationversion=$regstationversion"
          echo "regstationversion=$regstationversion" >> "$GITHUB_OUTPUT"

          [ "$(curl -o /dev/null -s -Iw '%{http_code}' -L "https://github.com/REG-Linux/REG-Station-binaries/releases/download/${regstationversion}/regstation-${regstationversion}-${{ matrix.cpu }}.tar.xz")" -eq 200 ] && skip=y
          if [ -z "$skip" ]; then
            # Patch Makefile to use 'reglinux-build:latest' docker image from ghcr.io
            sed -i '/^DOCKER_REPO/ s|reglinux|ghcr.io/reg-linux|' Makefile
            sed -i '/ build . -t /d' Makefile
            
            # Disable CCACHE
            sed -i '/BR2_CCACHE/d' configs/reglinux-board.common
            
            # After each package is installed, delete downloaded files
            sed -i '/stamp_installed\:/,/stamp_dircleaned\:/ s:^$:\trm -rfv "\$(\$(PKG)_DL_DIR)"\n:' buildroot/package/pkg-generic.mk
            
            # Hack needed to retrieve the proper staging name directory when packaging
            sed -i '/stamp_staging_installed\:/,/stamp_images_installed\:/ s:^$:\techo "host/\$(GNU_TARGET_NAME)/sysroot" > "\$(BUILD_DIR)/staging.dir"\n:' buildroot/package/pkg-generic.mk
            
            # Enable the flag and token to build regstation from source
            #sed -i 's/#BR2_PACKAGE_REGSTATION_BUILD_FROM_SOURCE=y/BR2_PACKAGE_REGSTATION_BUILD_FROM_SOURCE=y/' configs/reglinux-board.common
            echo "${GH_TOKEN}" > ./gh_token
            
            # Use cached toolchain if available from REG-Linux/REG-llvm-binaries
            cacheHASHshort="${{ hashFiles('custom/package/*llvm*/**', '.gitmodules') }}"
            cacheHASHshort="${cacheHASHshort:0:7}"
            if curl -s -L "https://github.com/REG-Linux/REG-llvm-binaries/releases/download/toolchain-${{ matrix.cpu }}/toolchain-${{ matrix.cpu }}-${cacheHASHshort}.tar.xz" | tar -xJf - 2>/dev/null
            then
              echo "toolchain-${{ matrix.cpu }}-${cacheHASHshort}.tar.xz extracted"
            else
              echo "toolchain-${{ matrix.cpu }}-${cacheHASHshort}.tar.xz not found"
              jobsandload="-j$(( $(nproc) - 1 ))"
              PARALLEL_BUILD=n DEBUG_BUILD=n CCACHE_DISABLE=1 make ${jobsandload} PKG=alsa-lib ${{ matrix.target }}-pkg
              
              XZ_OPT=-9 tar --ignore-failed-read -cJf "toolchain-${{ matrix.cpu }}-${cacheHASHshort}.tar.xz" output/
              gh release delete toolchain-${{ matrix.cpu }} --cleanup-tag -y --repo REG-Linux/REG-llvm-binaries || :
              gh release create toolchain-${{ matrix.cpu }} --repo REG-Linux/REG-llvm-binaries --latest=false --title "Toolchain cache for ${{ matrix.cpu }} targets" "toolchain-${{ matrix.cpu }}-${cacheHASHshort}.tar.xz"
              echo "Toolchain cache created"
              rm "toolchain-${{ matrix.cpu }}-${cacheHASHshort}.tar.xz"
            fi
          
            jobsandload="-j$(( $(nproc) - 1 ))"
            PARALLEL_BUILD=n DEBUG_BUILD=n CCACHE_DISABLE=1 make ${jobsandload} PKG=regstation ${{ matrix.target }}-pkg

            # Create package
            cd "${{ github.workspace }}/output/${{ matrix.target }}" || exit 1
            staging="$(<"${{ github.workspace }}/output/${{ matrix.target }}/build/staging.dir")"
            cat build/regstation*/.files-list-staging.txt | cut -d ',' -f 2 | sed -e "s+\.\/+${staging}\/+g" >regstation-staging-files.txt
            cat build/regstation*/.files-list.txt | cut -d ',' -f 2 | sed -e 's+\.\/+target\/+g' >regstation-target-files.txt
            cat regstation-staging-files.txt regstation-target-files.txt >filelist.txt
            sort -o sortedfilelist.txt -u filelist.txt
            XZ_OPT=-9 tar -cJf "${{ github.workspace }}/regstation-${regstationversion}-${{ matrix.cpu }}.tar.xz" --verbatim-files-from -T sortedfilelist.txt || :
            echo "dorelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts
        if: ${{ steps.compile_regstation_step.outputs.dorelease == 'true' && ! cancelled() }}
        id: upload_artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: regstation-${{ steps.compile_regstation_step.outputs.regstationversion }}-${{ matrix.cpu }}
          compression-level: 0
          path: regstation-${{ steps.compile_regstation_step.outputs.regstationversion }}-*

  create_release:
    name: Create release
    needs: compile-regstation
    if: ${{ needs.compile-regstation.outputs.dorelease == 'true' && ! cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: regstation-${{ needs.compile-regstation.outputs.regstationversion }}-*
          path: ./
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          repository: REG-Linux/REG-Station-binaries
          token: ${{ secrets.REG_TOKEN }}
          files: regstation-${{ needs.compile-regstation.outputs.regstationversion }}-*
          tag_name: ${{ needs.compile-regstation.outputs.regstationversion }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          name: regstation binaries (${{ needs.compile-regstation.outputs.regstationversion }})
